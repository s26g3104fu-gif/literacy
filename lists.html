<ul>
    <li>食パン(4枚切り)</li>
    <li>卵(1個)</li>
    <li>牛乳(100ml)</li>
    <li>砂糖(大さじ1)</li>
    <li>バター(適量)</li>

</ul>
<ol>
    <li>パンを切って卵をボウルに割り入れて牛乳と砂糖を入れて卵液を作る</li>
    <li>卵液を耐熱皿に移し食パンを浸してしみこませ電子レンジで600w1分加熱する</li>
    <li>フライパンにバターを入れて中火で熱し、卵液に浸した食パンを並べ入れる。こんがり焼き色が付いたら裏返し蓋をして焼き色がつくまで蒸し焼きにする。</li>
<li>器に盛り付けお好みで粉砂糖、はちみつをかける</li>
</ol>
<dl>
    <dt>おいしくなるコツ１</dt>
    <dd>少し乾燥したパンを使う</dd>
    <dt>おいしくなるコツ２</dt>
    <dd>厚切りパンにする</dd>
</dl>
